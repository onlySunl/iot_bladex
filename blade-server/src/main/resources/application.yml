      prefix: blade-


#blade配置
blade:
  #oauth2配置
  oauth2:
    #启用 oauth2
    enabled: true
    #使用 @org.springblade.test.Sm2KeyGenerator 获取,用于国密sm2验签,需和前端保持一致
    public-key: 04f55f9310939bd76129d70b7376298e7688a920a1c5f6adb3e893c5e0dc4c03be0c3f9a7a426a059202f09f123babe4c226e257acd935efe7f8fc738a515c12c6
    #使用 @org.springblade.test.Sm2KeyGenerator 获取,用于国密sm2解密,前端无需配置
    private-key: 00858e37f9196ef3bddee7dd973fe659ed6d076b886a7f5b8192aa8eef8345db31
  #token配置
  token:
    #是否有状态
    state: false
    #是否单用户登录
    single: false
    #单用户登录范围
    single-level: all
    #token签名 使用 @org.springblade.test.SignKeyGenerator 获取
    sign-key: yWdeZEVfH9uy2tf4763YHv3QOLw0sla4
    #token加密 使用 @org.springblade.test.CryptoKeyGenerator 获取
    crypto-key: plcK7kUYqi8NepCBPgY4JEeiGzLWsLYL
  #接口配置
  api:
    #报文加密配置
    crypto:
      #启用报文加密配置
      enabled: false
      #使用 @org.springblade.test.CryptoKeyGenerator 获取,需和前端保持一致
      aes-key: G6N8BlIHAK7NFSFtOLSu6h5CCC8489Jz
      #使用 @org.springblade.test.CryptoKeyGenerator 获取,需和前端保持一致
      des-key: tSiM6tXZG52Igmtv
  #jackson配置
  jackson:
    #null自动转空值
    null-to-empty: false
    #大数字自动转字符串
    big-num-to-string: true
    #支持text文本请求,与报文加密同时开启
    support-text-plain: false
  #redis序列化方式
  redis:
    serializer-type: protostuff
  #日志配置
  log:
    request:
      #开启控制台请求日志
      enabled: false
      #控制台请求日志忽略
      skip-url:
        - /blade-desk/notice/list
        - /blade-chat/weixin/**
      #开启错误日志入库
      error-log: false
  #xss配置
  xss:
    enabled: true
    skip-url:
      - /blade-chat/weixin
      - /blade-desk/notice/submit
      - /blade-flow/model/submit
      - /blade-develop/datasource/submit

  #安全框架配置
  secure:
    #严格模式
    #缺失令牌字段则取消授权
    strict-token: true
    #缺失请求头则取消授权
    strict-header: true
    #接口放行
    skip-url:
      - /blade-test/**

    #授权认证配置
    auth:
      - method: ALL
        pattern: /blade-chat/wechat/**
        expression: "hasAuth()"
      - method: ALL
        pattern: /blade-chat/qq/**
        expression: "hasStrictToken()"
      - method: ALL
        pattern: /blade-chat/ding/**
        expression: "hasStrictHeader()"
      - method: POST
        pattern: /blade-desk/dashboard/upload
        expression: "hasTimeAuth(9, 17)"
      - method: POST
        pattern: /blade-desk/dashboard/submit
        expression: "hasAnyRole('administrator', 'admin', 'user')"
    #基础认证配置
    basic:
      - method: ALL
        pattern: /blade-desk/dashboard/info
        username: "blade"
        password: "blade"
    #动态签名认证配置
    sign:
      - method: ALL
        pattern: /blade-desk/dashboard/sign
        crypto: "sha1"
    #多终端认证配置
    client:
      - client-id: sword
        path-patterns:
          - /blade-sword/**
      - client-id: saber
        path-patterns:
          - /blade-saber/**
  #多租户配置
  tenant:
    #多租户增强
    enhance: true
    #多租户授权保护
    license: false
    #动态数据库隔离功能
    dynamic-datasource: false
    #动态数据库隔离全局扫描
    dynamic-global: false
    #多租户字段名
    column: tenant_id
    #排除多租户逻辑
    exclude-tables:
      - blade_user
  #分库分表配置
  sharding:
    enabled: false

auto-table:
  enable: true
  show-banner: true
  mode: update
  auto-drop-column: true
  model-package: org.springblade.modules.iot.domain
  strict-extends: true
  index-prefix: IDX_
  super-insert-position: after
  auto-drop-index: true